<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Voilago – Giriş Yap</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #f4f4f2; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.card { background: #fff; border-radius: 14px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
.logo { text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 0.12em; margin-bottom: 0.3rem; color: #1a1a1a; }
.logo span { color: #3a7d44; }
h1 { text-align: center; font-size: 1.35rem; font-weight: 700; color: #111; margin-bottom: 1.6rem; }
.form-group { margin-bottom: 1rem; }
.input-wrap { position: relative; }
input[type="email"], input[type="password"] { width: 100%; padding: 0.85rem 2.8rem 0.85rem 1rem; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.95rem; color: #111; outline: none; background: #f8f8f6; transition: border-color 0.2s, background 0.2s; font-family: inherit; }
input:focus { border-color: #3a7d44; background: #fff; }
input.error { border-color: #e53935; }
input::placeholder { color: #bbb; }
.pw-toggle { position: absolute; right: 0.8rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #aaa; display: flex; align-items: center; }
.pw-toggle svg { width: 20px; height: 20px; }
.error-msg { color: #e53935; font-size: 0.78rem; margin-top: 0.3rem; display: none; }
.row { display: flex; align-items: center; justify-content: space-between; margin: 0.2rem 0 1.2rem; }
.remember { display: flex; align-items: center; gap: 0.4rem; font-size: 0.84rem; color: #444; cursor: pointer; }
.remember input[type="checkbox"] { width: 15px; height: 15px; accent-color: #3a7d44; }
.forgot { font-size: 0.84rem; color: #3a7d44; text-decoration: none; }
.forgot:hover { text-decoration: underline; }
.btn-primary { width: 100%; padding: 0.9rem; background: #3a7d44; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.15s; font-family: inherit; }
.btn-primary:hover { background: #4caf50; }
.btn-primary:disabled { background: #a5d6a7; cursor: not-allowed; }
.register-row { text-align: center; font-size: 0.88rem; color: #555; margin: 1rem 0; }
.register-row a { color: #3a7d44; font-weight: 600; text-decoration: none; }
.register-row a:hover { text-decoration: underline; }
.divider { display: flex; align-items: center; gap: 0.8rem; color: #bbb; font-size: 0.75rem; margin: 0.8rem 0; text-transform: uppercase; letter-spacing: 0.05em; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #eee; }
.btn-social { width: 100%; padding: 0.75rem; background: #fff; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.92rem; font-weight: 500; color: #333; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.6rem; margin-bottom: 0.7rem; transition: background 0.15s, border-color 0.15s; font-family: inherit; }
.btn-social:hover { background: #f7f7f7; border-color: #bbb; }
.btn-social svg { width: 20px; height: 20px; }
.alert { border-radius: 8px; padding: 0.7rem 1rem; font-size: 0.83rem; margin-top: 0.8rem; display: none; line-height: 1.5; }
.alert.error { background: #fff0f0; border: 1px solid #ffcdd2; color: #c62828; }
.alert.success { background: #f0fff4; border: 1px solid #c8e6c9; color: #1b5e20; }
#registerSection, #forgotSection { display: none; }
</style>
</head>
<body>
<div class="card">
  <div id="loginSection">
    <div class="logo">VOI<span>LAGO</span></div>
    <h1>Giriş yap</h1>
    <div class="form-group">
      <div class="input-wrap">
        <input type="email" id="email" placeholder="E-posta adresi" autocomplete="email"/>
      </div>
      <div class="error-msg" id="emailError">E-posta adresinizi girin.</div>
    </div>
    <div class="form-group">
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Şifre" autocomplete="current-password"/>
        <button class="pw-toggle" onclick="togglePw('password','eyeIcon')" type="button">
          <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
          </svg>
        </button>
      </div>
      <div class="error-msg" id="passwordError">Şifrenizi girin.</div>
    </div>
    <div class="row">
      <label class="remember"><input type="checkbox" id="remember"/> Oturumum açık kalsın</label>
      <a href="#" class="forgot" onclick="showForgot(event)">Şifremi unuttum</a>
    </div>
    <button class="btn-primary" id="loginBtn" onclick="handleLogin()">E-posta ile giriş yap</button>
    <div class="alert error" id="loginError"></div>
    <div class="alert success" id="loginSuccess"></div>
    <p class="register-row">Henüz hesabın yok mu? <a href="#" onclick="showRegister(event)">Hesap aç ►</a></p>
    <div class="divider">VEYA</div>
    <button class="btn-social" onclick="handleGoogle()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google ile giriş yap
    </button>
  </div>

  <div id="registerSection">
    <div class="logo">VOI<span>LAGO</span></div>
    <h1>Hesap aç</h1>
    <div class="form-group">
      <div class="input-wrap"><input type="email" id="regEmail" placeholder="E-posta adresi"/></div>
      <div class="error-msg" id="regEmailError"></div>
    </div>
    <div class="form-group">
      <div class="input-wrap">
        <input type="password" id="regPassword" placeholder="Şifre (en az 6 karakter)"/>
        <button class="pw-toggle" onclick="togglePw('regPassword','eyeIcon2')" type="button">
          <svg id="eyeIcon2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
          </svg>
        </button>
      </div>
      <div class="error-msg" id="regPasswordError"></div>
    </div>
    <button class="btn-primary" id="registerBtn" onclick="handleRegister()">E-posta ile hesap aç</button>
    <div class="alert error" id="registerError"></div>
    <div class="alert success" id="registerSuccess"></div>
    <p class="register-row">Zaten hesabın var mı? <a href="#" onclick="showLogin(event)">Giriş yap ►</a></p>
    <div class="divider">VEYA</div>
    <button class="btn-social" onclick="handleGoogle()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google ile hesap aç
    </button>
  </div>

  <div id="forgotSection">
    <div class="logo">VOI<span>LAGO</span></div>
    <h1>Şifremi Unuttum</h1>
    <p style="text-align:center;color:#888;font-size:0.85rem;margin-bottom:1.5rem;">E-postana sıfırlama bağlantısı gönderelim</p>
    <div class="form-group"><input type="email" id="forgotEmail" placeholder="E-posta adresi"/></div>
    <button class="btn-primary" onclick="handleForgot()">Sıfırlama Bağlantısı Gönder</button>
    <div class="alert error" id="forgotError"></div>
    <div class="alert success" id="forgotSuccess"></div>
    <p class="register-row"><a href="#" onclick="showLogin(event)">← Geri dön</a></p>
  </div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient('https://mvecoktdgcalobeeesjz.supabase.co','sb_publishable_DJ3IS9dzeavUfKm5xP_5hA_qBCDg1NF');
const BASE = '/Voilago';

window.addEventListener('load', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = BASE + '/index.html';
});

async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  clearErrors();
  if (!email) { showInputErr('email','emailError','E-posta girin.'); return; }
  if (!password) { showInputErr('password','passwordError','Şifre girin.'); return; }
  btn.textContent = 'Giriş yapılıyor...'; btn.disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  btn.textContent = 'E-posta ile giriş yap'; btn.disabled = false;
  if (error) { showAlert('loginError', 'E-posta veya şifre hatalı.'); return; }
  window.location.href = BASE + '/index.html';
}

async function handleRegister() {
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const btn = document.getElementById('registerBtn');
  if (!email) { showInputErr('regEmail','regEmailError','E-posta girin.'); return; }
  if (password.length < 6) { showInputErr('regPassword','regPasswordError','Şifre en az 6 karakter olmalı.'); return; }
  btn.textContent = 'Hesap oluşturuluyor...'; btn.disabled = true;
  const { error } = await sb.auth.signUp({ email, password });
  btn.textContent = 'E-posta ile hesap aç'; btn.disabled = false;
  if (error) { showAlert('registerError', error.message.includes('already') ? 'Bu e-posta zaten kayıtlı.' : 'Hata oluştu.'); return; }
  showAlert('registerSuccess', '✅ Hesabın oluşturuldu! E-postanı doğrula, sonra giriş yap.', true);
  setTimeout(() => showLogin(), 3000);
}

async function handleForgot() {
  const email = document.getElementById('forgotEmail').value.trim();
  if (!email) return;
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + BASE + '/index.html'
  });
  if (error) showAlert('forgotError', 'Hata oluştu.');
  else showAlert('forgotSuccess', '✅ Sıfırlama bağlantısı gönderildi!', true);
}

async function handleGoogle() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + BASE + '/index.html' }
  });
}

function togglePw(inputId, iconId) {
  const inp = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
  } else {
    inp.type = 'password';
    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
  }
}

function showRegister(e) { e?.preventDefault(); hide('loginSection'); show('registerSection'); }
function showLogin(e) { e?.preventDefault(); hide('registerSection'); hide('forgotSection'); show('loginSection'); }
function showForgot(e) { e?.preventDefault(); hide('loginSection'); show('forgotSection'); }
function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function showAlert(id, msg, success = false) {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = 'alert ' + (success ? 'success' : 'error'); el.style.display = 'block';
}
function showInputErr(inputId, errId, msg) {
  document.getElementById(inputId)?.classList.add('error');
  const el = document.getElementById(errId);
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}
function clearErrors() {
  ['email','password'].forEach(id => document.getElementById(id)?.classList.remove('error'));
  ['emailError','passwordError','loginError','loginSuccess'].forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });
}
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('loginSection').style.display !== 'none') handleLogin();
  else if (document.getElementById('registerSection').style.display !== 'none') handleRegister();
});
</script>
</body>
</html>
